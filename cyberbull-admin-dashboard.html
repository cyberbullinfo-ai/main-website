<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard - CyberBull</title>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #3b82f6 0%, #0f172a 32%, #020617 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: rgba(15, 23, 42, 0.96);
      color: #fff;
      padding: 24px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      backdrop-filter: blur(12px);
    }

    main {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto 36px;
    }

    .topbar-title {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .topbar-title strong {
      font-size: 1.6rem;
      letter-spacing: -0.03em;
    }

    .topbar-title .small {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 18px 32px rgba(37, 99, 235, 0.18);
    }

    .muted {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .danger {
      background: #ef4444;
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .tab {
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      cursor: pointer;
      color: #cbd5e1;
      transition: background 160ms ease, color 160ms ease;
    }

    .tab.active {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    .panel {
      background: rgba(15, 23, 42, 0.9);
      padding: 24px;
      border-radius: 24px;
      min-height: 260px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .metric-card {
      padding: 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .metric-card strong {
      font-size: 28px;
      color: #fff;
      display: block;
    }

    .metric-card span {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .metrics-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      color: #e2e8f0;
    }

    th {
      font-size: 0.94rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td {
      background: rgba(15, 23, 42, 0.8);
      border: none;
      border-radius: 16px;
    }

    tr td:first-child {
      border-top-left-radius: 16px;
      border-bottom-left-radius: 16px;
    }

    tr td:last-child {
      border-top-right-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1; }
    .small { font-size: 0.92rem; color: #94a3b8; }
    input,select { padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(148, 163, 184, 0.18); background: rgba(15, 23, 42, 0.8); color: #e2e8f0; width: 100%; }
    input::placeholder { color: #94a3b8; }
    .table-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 960px) { .summary-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="auth.js"></script>
</head>
<body>
  <script>
    window.globalAuth.requireAdminAuth();
  </script>
  <header>
    <div>
      <strong>CyberBull Admin Panel</strong>
      <div class="small">Admin control center</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="homeBtn" class="btn muted">Home</button>
      <button id="logoutBtn" class="btn muted">Logout</button>
    </div>
  </header>
  <main>
    <div class="summary-grid">
      <div class="metric-card">
        <span>Total users</span>
        <strong id="totalUsersMetric">0</strong>
      </div>
      <div class="metric-card">
        <span>Active in 30d</span>
        <strong id="activeUsersMetric">0</strong>
      </div>
      <div class="metric-card">
        <span>Admins</span>
        <strong id="adminCountMetric">0</strong>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="accounts">Users</div>
      <div class="tab" data-tab="stats">Stats</div>
      <div class="tab" data-tab="inspector">Inspector</div>
      <div class="tab" data-tab="tools">Tools</div>
    </div>

    <div id="accounts" class="panel">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="amSearch" placeholder="Search username or domain">
        <input id="amFilterDomain" placeholder="Filter by domain">
        <button id="amRefresh" class="btn primary">Refresh</button>
      </div>
      <div id="amTable"></div>
    </div>

    <div id="stats" class="panel" style="display:none">
      <div id="statsContainer"></div>
    </div>

    <div id="inspector" class="panel" style="display:none">
      <div id="inspectorContainer"></div>
    </div>

    <div id="tools" class="panel" style="display:none">
      <h3>Announcements</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="announceInput" placeholder="Announcement text"><button id="announceBtn" class="btn primary">Post</button></div>
      <div id="announcementsList" class="small"></div>
      <hr>
      <h3>Challenges</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="challengeInput" placeholder="Challenge title"><button id="challengeBtn" class="btn primary">Add</button></div>
      <div id="challengesList" class="small"></div>
      <hr>
      <h3>Achievements</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="achievementInput" placeholder="Achievement name"><button id="achievementBtn" class="btn primary">Add</button></div>
      <div id="achievementsList" class="small"></div>
      <hr>
      <h3>XP Rewards</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="xpRewardLabelInput" placeholder="Reward name">
        <input id="xpRewardValueInput" placeholder="XP value" type="number" style="width:120px;">
        <button id="xpRewardBtn" class="btn primary">Save</button>
      </div>
      <div id="xpRewardsList" class="small"></div>
      <hr>
      <h3>Admin Settings</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="adminSecretInput" placeholder="Admin secret (set new)"><button id="adminSecretBtn" class="btn primary">Save</button></div>
      <div class="small">Change the admin creation secret. New users providing this code become admins.</div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-api.js"></script>
  <script src="admin.js"></script>
  <script>
    // tab switching
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.dataset.tab;
      ['accounts','stats','inspector','tools'].forEach(id=>document.getElementById(id).style.display = (id===tab)?'block':'none');
      if (tab==='accounts') renderAccountManager();
      if (tab==='stats') renderStatsOverview();
      if (tab==='inspector') document.getElementById('inspectorContainer').innerHTML = '<div class="small">Select a user in Account Manager to inspect.</div>';
      if (tab==='tools') renderAdminTools();
    }));

    document.getElementById('amRefresh').addEventListener('click', ()=>renderAccountManager());
    document.getElementById('amSearch').addEventListener('input', ()=>renderAccountManager());
    document.getElementById('amFilterDomain').addEventListener('input', ()=>renderAccountManager());
    document.getElementById('homeBtn').addEventListener('click', ()=> window.location.href = 'cyberbull-landing.html');

    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      localStorage.removeItem('currentUser');
      localStorage.removeItem('currentUserKey');
      localStorage.removeItem('currentSchool');
      localStorage.removeItem('isAdmin');
      window.location.href = 'cyberbull-landing.html';
    });

    // initial checks
    requireAdminRedirect();
    renderAccountManager();
    renderStatsOverview();
    if (typeof loadServerUsers === 'function') {
      loadServerUsers();
    }
    setInterval(() => {
      renderAccountManager();
      renderStatsOverview();
      if (typeof loadServerUsers === 'function') loadServerUsers();
    }, 5000);
  </script>
</body>
</html>
