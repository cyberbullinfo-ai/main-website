<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - CyberBull</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f6f8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#fff;padding:28px;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.08);width:360px}
    .box h2{margin-bottom:12px}
    .form-group{margin-bottom:12px}
    input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px}
    button{padding:10px 14px;border:none;border-radius:6px;background:#0078ff;color:#fff;cursor:pointer}
    .error{color:#d32f2f;margin-top:8px}
  </style>
  <style>
    /* Translate UI styles */
    .translate-btn{position:fixed;top:18px;right:18px;z-index:9999;border:none;padding:8px 10px;border-radius:10px;background:rgba(0,0,0,0.36);color:#fff;font-size:14px;backdrop-filter:blur(6px)}
    .translate-menu{display:none;position:fixed;top:56px;right:18px;z-index:10000;background:#fff;color:#111;border-radius:10px;padding:8px;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
    .translate-menu.open{display:block}
    .translate-menu select{display:block;margin-bottom:8px;padding:6px;border-radius:6px;border:1px solid #d1d5db}
    .translate-menu button{display:block;padding:8px;border-radius:6px;border:none;background:#1a67d8;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <h2>Admin Login</h2>
    <div class="form-group">
      <input id="domain" placeholder="school.smartschool.be" autocomplete="off">
    </div>
    <div class="form-group">
      <input id="username" placeholder="username" autocomplete="off">
    </div>
    <div class="form-group">
      <input id="password" type="password" placeholder="password">
    </div>
    <div class="form-group">
      <button id="loginBtn">Login</button>
    </div>
    <div class="form-group">
      <button id="backBtn" style="width:100%;padding:10px 14px;border:none;border-radius:6px;background:#6c757d;color:#fff;cursor:pointer;margin-top:8px;">Back</button>
    </div>
    <div class="error" id="error"></div>
  </div>

  <script src="admin.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', ()=>{
      const domain = document.getElementById('domain').value.trim().toLowerCase();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('error'); err.textContent = '';
      adminLogin(domain, username, password).then(res=>{
        if (res.success) window.location.href = 'cyberbull-admin-dashboard.html';
        else err.textContent = res.message || 'Login failed';
      });
    });

    document.getElementById('backBtn').addEventListener('click', ()=>{
      window.location.href = 'cyberbull-landing.html';
    });
  </script>
  <div id="translateUI">
    <button id="translateButton" class="translate-btn" aria-label="Translate">🌐</button>
    <div id="translateMenu" class="translate-menu" role="dialog" aria-hidden="true">
      <select id="translateSelect">
        <option value="nl">Nederlands</option>
        <option value="en">English</option>
        <option value="es">Espanol</option>
        <option value="fr">Francais</option>
        <option value="de">Deutsch</option>
      </select>
      <button id="translateApplyButton" type="button">Apply</button>
    </div>
  </div>
  <script>
  (function(){
    const btn=document.getElementById('translateButton');
    const menu=document.getElementById('translateMenu');
    const sel=document.getElementById('translateSelect');
    const apply=document.getElementById('translateApplyButton');
    if(!btn||!menu) return;
    btn.addEventListener('click',()=>menu.classList.toggle('open'));
    apply.addEventListener('click',()=>{
      const lang=sel.value;
      localStorage.setItem('cyberbullLanguage',lang);
      menu.classList.remove('open');
      if(typeof updateTexts==='function') try{updateTexts(lang)}catch(e){}
    });
    const lang=localStorage.getItem('cyberbullLanguage')||'nl';
    if(sel) sel.value=lang;
  })();
  </script>
</body>
</html>
