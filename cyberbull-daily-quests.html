<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Quests - CyberBull</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: white;
    }
    
    .header h1 {
      font-size: 32px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .stat-badge {
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 25px;
      color: white;
      font-weight: bold;
      backdrop-filter: blur(10px);
    }
    
    .reset-timer {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 5px;
    }
    
    .quests-grid {
      display: grid;
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .quest-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      transition: all 0.3s ease;
    }
    
    .quest-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    }
    
    .quest-card.completed {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      border-left: 5px solid #28a745;
    }
    
    .quest-info {
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    
    .quest-icon {
      font-size: 40px;
      line-height: 1;
    }
    
    .quest-details {
      flex: 1;
    }
    
    .quest-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    
    .quest-description {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 12px;
      color: #999;
      font-weight: bold;
    }
    
    .quest-rewards {
      display: flex;
      gap: 15px;
    }
    
    .reward {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      font-size: 16px;
    }
    
    .reward.xp {
      color: #667eea;
    }
    
    .reward.coins {
      color: #f59e0b;
    }
    
    .quest-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    
    .status-badge {
      background: #667eea;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .status-badge.completed {
      background: #28a745;
    }
    
    .status-badge.in-progress {
      background: #ffc107;
      color: #333;
    }
    
    .claim-button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .claim-button:hover {
      background: #20c997;
      transform: translateY(-2px);
    }
    
    .claim-button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .empty-state {
      background: white;
      border-radius: 15px;
      padding: 60px 30px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    
    .empty-state h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 24px;
    }
    
    .empty-state p {
      color: #666;
      margin-bottom: 20px;
    }
    
    .statistics {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      margin-bottom: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-item label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 8px;
    }
    
    .stat-item .value {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
    }
    
    .bottom-nav {
      display: flex;
      gap: 15px;
    }
    
    .btn {
      flex: 1;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
    }
    
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <script>
    if (window.globalAuth.requireAuthAsync) {
      window.globalAuth.requireAuthAsync().catch(e => console.warn('requireAuthAsync failed', e));
    } else {
      window.globalAuth.requireAuth();
    }
  </script>

<div class="container">
  <div class="header">
    <h1>📋 Daily Quests</h1>
    <div class="header-right">
      <div class="stat-badge">
        ✓ <span id="completedCount">0</span>/3 Completed
        <div class="reset-timer">Resets at 00:00 UTC</div>
      </div>
      <button class="btn btn-secondary" style="width: auto;" onclick="goBack()">← Back</button>
    </div>
  </div>
  
  <div class="statistics">
    <div class="stat-item">
      <label>Today's XP</label>
      <div class="value" id="todayXp">0</div>
    </div>
    <div class="stat-item">
      <label>Today's Coins</label>
      <div class="value" id="todayCoins">0</div>
    </div>
    <div class="stat-item">
      <label>Streak</label>
      <div class="value" id="streakCount">0</div>
    </div>
  </div>
  
  <div class="quests-grid" id="questsContainer">
    Loading quests...
  </div>
  
  <div class="bottom-nav">
    <button class="btn btn-primary" onclick="refreshQuests()">🔄 Refresh Quests</button>
    <button class="btn btn-secondary" onclick="goBack()">← Back to Home</button>
  </div>
</div>

<script src="admin.js"></script>
<script src="progression.js"></script>

<script>
  const currentUser = localStorage.getItem('currentUser');
  const currentUserKey = localStorage.getItem('currentUserKey');
  
  if (!currentUser || !currentUserKey) {
    window.location.href = 'cyberbull-landing.html';
  }
  
  function getQuestEmoji(questId) {
    const emojiMap = {
      'study_30m': '📖',
      'study_60m': '📚',
      'study_120m': '🎓',
      'focus_90': '🎯',
      'multiplayer_session': '👥',
      'buy_item': '🛍️',
      'login_streak': '🔥'
    };
    return emojiMap[questId] || '⭐';
  }
  
  function renderQuests() {
    const quests = window.progressionAPI.getDailyQuests(currentUserKey);
    const user = getUserByKey(currentUserKey);
    
    let completed = 0;
    let totalXp = 0;
    let totalCoins = 0;
    
    let html = '';
    
    quests.forEach(quest => {
      const percent = Math.min((quest.progress / quest.target) * 100, 100);
      const isCompleted = quest.completed;
      
      if (isCompleted) {
        completed++;
        totalXp += quest.reward.xp;
        totalCoins += quest.reward.coins;
      }
      
      html += `
        <div class="quest-card ${isCompleted ? 'completed' : ''}">
          <div class="quest-info">
            <div class="quest-icon">${getQuestEmoji(quest.id)}</div>
            <div class="quest-details">
              <div class="quest-name">${quest.name}</div>
              <div class="quest-description">${quest.target}/${quest.progress} completed</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${percent}%"></div>
              </div>
              <div class="progress-text">${Math.round(percent)}% Progress</div>
            </div>
          </div>
          <div class="quest-status">
            <div class="quest-rewards">
              <div class="reward xp">⭐ ${quest.reward.xp} XP</div>
              <div class="reward coins">💰 ${quest.reward.coins}</div>
            </div>
            ${isCompleted ? `
              <div class="status-badge completed">✓ Completed</div>
            ` : `
              <div class="status-badge in-progress">In Progress</div>
            `}
          </div>
        </div>
      `;
    });
    
    document.getElementById('questsContainer').innerHTML = html || '<div class="empty-state"><h2>No quests available</h2></div>';
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('todayXp').textContent = totalXp;
    document.getElementById('todayCoins').textContent = totalCoins;
    document.getElementById('streakCount').textContent = (user?.streak || 0);
  }
  
  function refreshQuests() {
    // Clear today's quests to regenerate
    const questKey = `dailyquests_${currentUserKey}_${new Date().toLocaleDateString()}`;
    localStorage.removeItem(questKey);
    renderQuests();
    alert('✓ Quests refreshed!');
  }
  
  function goBack() {
    window.location.href = 'cyberbull-student.html';
  }
  
  // Render quests on page load
  renderQuests();
  
  // Refresh quests every 30 seconds
  setInterval(renderQuests, 30000);
</script>

</body>
</html>
