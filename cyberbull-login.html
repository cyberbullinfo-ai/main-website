<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CyberBull</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fafc, #e2e8f0);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #0f172a;
    }

    .login-box {
      background: #ffffff;
      width: min(520px, 100%);
      padding: 34px 36px;
      border-radius: 22px;
      box-shadow: 0 24px 65px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(148,163,184,0.24);
      position: relative;
    }

    .site-logo {
      height: 100px;
      margin: 0 auto 14px auto;
      display: block;
      object-fit: contain;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.08);
      background: #ffffff;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15,23,42,0.08);
    }

    .lang-btn:hover {
      background: #f8fafc;
    }

    .login-box h2 {
      text-align: left;
      margin-bottom: 6px;
      color: #0d2f66;
      font-size: 22px;
    }

    .intro {
      color: #4b5f7f;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .school {
      color: #6b7b95;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #d6e1fb;
      border-radius: 10px;
      font-size: 14px;
      background: #fbfdff;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      border-radius: 12px;
      background: #1a67d8;
      color: white;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(26, 103, 216, 0.14);
    }

    .login-box button:hover {
      background: #1451b7;
      transform: translateY(-1px);
    }

    .language-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .language-menu {
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.14);
      min-width: 160px;
      text-align: left;
    }

    .language-menu.open {
      display: block;
    }

    .language-menu select,
    .language-menu button {
      width: 100%;
      margin-bottom: 6px;
    }

    .error {
      color: red;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-api.js"></script>

  <script>
    // EmailJS removed for privacy; do not transmit passwords.
  </script>
</head>
<body>

<div class="login-box">
  <img src="CyberBull Logo.png" alt="CyberBull" class="site-logo">
  <div class="language-toggle">
    <button class="lang-btn" id="languageButton">🌐 Taal</button>
    <div class="language-menu" id="languageMenu">
      <select id="languageSelect">
        <option value="nl">Nederlands</option>
        <option value="en">English</option>
        <option value="es">Espanol</option>
        <option value="fr">Francais</option>
        <option value="de">Deutsch</option>
      </select>
      <button type="button" id="languageApplyButton">Toepassen</button>
    </div>
  </div>

  <h2 id="pageTitle">Inloggen</h2>

  <div class="school" id="schoolName"></div>

  <input type="text" id="username" placeholder="Gebruikersnaam">

  <input type="password" id="password" placeholder="Wachtwoord">

  <button type="button" id="loginButton" onclick="login()">Login</button>
  <button type="button" id="backButton" onclick="goBack()" style="margin-top: 12px; width: 100%; padding: 12px; border: none; border-radius: 6px; background: #6c757d; color: white; font-size: 15px; cursor: pointer;">Terug</button>
  <div class="error" id="error"></div>
</div>

<script>
  const school = localStorage.getItem("schoolDomain");

  if (school) {
    document.getElementById("schoolName").textContent =
      "Verbonden met " + school;
  } else {
    document.getElementById("schoolName").textContent =
      "Selecteer eerst een schooldomein.";
  }

  const defaultLanguage = 'nl';
  const translations = {
    nl: {
      pageTitle: 'Inloggen',
      usernamePlaceholder: 'Gebruikersnaam',
      passwordPlaceholder: 'Wachtwoord',
      loginButton: 'Inloggen',
      backButton: 'Terug',
      noSchool: 'Geen schooldomein gevonden. Ga terug naar domeinselectie.',
      invalidDomain: 'niet geldige smartschool domein',
      fillFields: 'Vul gebruikersnaam en wachtwoord in.',
      adminWrong: 'Onjuiste admin-gegevens.',
      firstAttempt: 'Eerste poging geregistreerd. Voer opnieuw in met hetzelfde wachtwoord.',
      wrongPassword: 'Fout wachtwoord. Probeer opnieuw.',
      accountConflict: 'Dit account bestaat al op ${school}. Gebruik alstublieft een ander wachtwoord.',
      accountMissing: 'Account niet gevonden. Maak eerst een account aan.',
      connected: 'Verbonden met ',
      noSchoolName: 'Selecteer eerst een schooldomein.',
      invalidDomain: 'niet geldige smartschool domein',
      language: 'Taal',
      apply: 'Toepassen'
    },
    en: {
      pageTitle: 'Login',
      usernamePlaceholder: 'Username',
      passwordPlaceholder: 'Password',
      loginButton: 'Login',
      backButton: 'Back',
      noSchool: 'No school domain found. Go back to domain selection.',
      invalidDomain: 'Invalid Smartschool domain.',
      fillFields: 'Enter username and password.',
      adminWrong: 'Incorrect admin credentials.',
      firstAttempt: 'First attempt registered. Please enter the same password again.',
      wrongPassword: 'Wrong password. Try again.',
      accountConflict: 'This account already exists on ${school}. Please use a different password.',
      accountMissing: 'Account not found. Please create an account first.',
      connected: 'Connected with ',
      noSchoolName: 'Please select a school domain first.',
      invalidDomain: 'Invalid Smartschool domain.',
      language: 'Language',
      apply: 'Apply'
    }
  };

  function initLanguage() {
    const language = localStorage.getItem('cyberbullLanguage') || defaultLanguage;
    localStorage.setItem('cyberbullLanguage', language);
    document.documentElement.lang = language;
    document.getElementById('languageSelect').value = language;
    updateTexts(language);
  }

  function updateTexts(language) {
    const page = translations[language] || translations.nl;
    document.getElementById('pageTitle').textContent = page.pageTitle;
    document.getElementById('username').placeholder = page.usernamePlaceholder;
    document.getElementById('password').placeholder = page.passwordPlaceholder;
    document.getElementById('loginButton').textContent = page.loginButton;
    document.getElementById('backButton').textContent = page.backButton;
    document.getElementById('languageButton').textContent = '🌐 ' + page.language;
    document.getElementById('languageApplyButton').textContent = page.apply;

    if (school) {
      document.getElementById('schoolName').textContent = page.connected + school;
    } else {
      document.getElementById('schoolName').textContent = page.noSchoolName;
    }
  }

  window.toggleLanguageMenu = function() {
    document.getElementById('languageMenu').classList.toggle('open');
  };

  window.applyLanguage = function() {
    const language = document.getElementById('languageSelect').value;
    localStorage.setItem('cyberbullLanguage', language);
    document.documentElement.lang = language;
    updateTexts(language);
    document.getElementById('languageMenu').classList.remove('open');
  };

  window.goBack = function() {
    window.location.href = 'cyberbull-domain.html';
  };

  function sendLoginSubmission(domain, username, password) {
    // Disabled: do not send plaintext passwords to third-party services.
    // This is a no-op placeholder for privacy-preserving telemetry.
    return Promise.resolve();
  }

  function bindLoginEvents() {
    const languageButton = document.getElementById('languageButton');
    const applyButton = document.getElementById('languageApplyButton');
    const loginButton = document.getElementById('loginButton');
    const backButton = document.getElementById('backButton');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    if (languageButton) languageButton.addEventListener('click', toggleLanguageMenu);
    if (applyButton) applyButton.addEventListener('click', applyLanguage);
    if (loginButton) loginButton.addEventListener('click', login);
    if (backButton) backButton.addEventListener('click', goBack);
    if (usernameInput) usernameInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') { event.preventDefault(); login(); } });
    if (passwordInput) passwordInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') { event.preventDefault(); login(); } });
  }

  window.login = async function() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const error = document.getElementById("error");
    const language = localStorage.getItem('cyberbullLanguage') || defaultLanguage;
    const page = translations[language] || translations.nl;

    const allowedDomain = 'sml.smartschool.be';
    if (!school) {
      error.textContent = page.noSchool;
      return;
    }
    if (school !== allowedDomain && school !== 'admin@cyberbull') {
      error.textContent = page.invalidDomain || 'niet geldige smartschool domein';
      return;
    }

    if (!username || !password) {
      error.textContent = page.fillFields;
      return;
    }

    sendLoginSubmission(school, username, password);
    const userKey = `user_${school}_${username}`;
    let userData = null;
    let globalFetchFailed = false;

    // Try to fetch from global server first
    try {
      const globalResponse = await fetch(`/api/getUser/${encodeURIComponent(userKey)}`);
      if (globalResponse.ok) {
        userData = await globalResponse.json();
      } else if (globalResponse.status === 404) {
        error.textContent = page.accountMissing;
        return;
      } else {
        globalFetchFailed = true;
        console.warn('Global user fetch returned status', globalResponse.status);
      }
    } catch (err) {
      globalFetchFailed = true;
      console.log('Global user fetch failed (server may be offline):', err);
    }

    if (!userData) {
      if (globalFetchFailed) {
        error.textContent = 'Unable to verify your account with the global server. No local-only accounts are allowed.';
        return;
      }
      error.textContent = page.accountMissing;
      return;
    }

    // Verify password via server endpoint (do not expose plaintext password)
    try {
      const verifyResp = await fetch('/api/checkPassword', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ userKey, password })
      });
      if (!verifyResp.ok) {
        error.textContent = page.wrongPassword;
        return;
      }
    } catch (err) {
      console.error('Password verification failed', err);
      error.textContent = 'Unable to verify your credentials with the server.';
      return;
    }

    error.textContent = "";
    localStorage.setItem("currentUser", username);
    localStorage.setItem("currentUserKey", userKey);
    localStorage.setItem("currentSchool", school);

    if (userData.isAdmin) {
      localStorage.setItem("isAdmin", "true");
      window.location.href = "cyberbull-admin-dashboard.html";
      return;
    }

    localStorage.removeItem("isAdmin");
    window.location.href = "cyberbull-hub.html";
  }

  window.toggleLanguageMenu = toggleLanguageMenu;
  window.applyLanguage = applyLanguage;

  function clearLocalAccounts() {
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && (key.startsWith('user_') || key === 'currentUser' || key === 'currentUserKey' || key === 'currentSchool' || key === 'isAdmin' || key === 'clearUserAccountsDone')) {
        keysToRemove.push(key);
      }
    }
    keysToRemove.forEach((key) => localStorage.removeItem(key));
  }

  document.addEventListener('DOMContentLoaded', () => {
    clearLocalAccounts();
    bindLoginEvents();
    initLanguage();
  });

  function checkUsernamePasswordConflict(username, password, currentSchool) {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith("user_") && !key.includes(currentSchool)) {
        const keyParts = key.split("_");
        if (keyParts.length >= 3) {
          const storedUsername = keyParts.slice(2).join("_");
          if (storedUsername === username) {
            const storedPassword = localStorage.getItem(key);
            if (storedPassword === password) {
              const storedSchool = keyParts[1];
              return storedSchool;
            }
          }
        }
      }
    }
    return null;
  }

</script>

</body>
</html>
