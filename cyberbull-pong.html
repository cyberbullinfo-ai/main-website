<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pong - CyberBull</title>
  <script src="progression.js"></script>
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#0f172a 0%,#111827 60%,#0f172a 100%);color:#e2e8f0;font-family:Inter,system-ui,sans-serif}
    .container{width:100%;max-width:820px;padding:18px}
    canvas{display:block;width:100%;height:auto;background:#0b1220;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,.6)}
    .hud{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
    .btn{background:#7c3aed;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer}
    .info{color:#94a3b8}
    /* Translate UI styles */
    .translate-btn{position:fixed;top:18px;right:18px;z-index:9999;border:none;padding:8px 10px;border-radius:10px;background:rgba(0,0,0,0.36);color:#fff;font-size:14px;backdrop-filter:blur(6px)}
    .translate-menu{display:none;position:fixed;top:56px;right:18px;z-index:10000;background:#fff;color:#111;border-radius:10px;padding:8px;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
    .translate-menu.open{display:block}
    .translate-menu select{display:block;margin-bottom:8px;padding:6px;border-radius:6px;border:1px solid #d1d5db}
    .translate-menu button{display:block;padding:8px;border-radius:6px;border:none;background:#1a67d8;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <script src="auth.js"></script>
  <script>
    window.globalAuth.requireAuth();
  </script>
  <div class="container">
    <canvas id="game"></canvas>
    <div class="hud">
      <div class="info">Left: W / S — Right: ↑ / ↓ — Press Space to (Re)Start</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="findMatch" class="btn">Find Online Match</button>
        <button id="restart" class="btn">Restart</button>
        <button id="speedBtn" class="btn">Speed: x1</button>
        <button class="btn" onclick="window.location.href='cyberbull-games.html'">← Games</button>
        <label style="color:#94a3b8;display:flex;align-items:center;gap:6px">
          <input id="aiToggle" type="checkbox" /> AI Opponent
        </label>
      </div>
    </div>
    <div style="margin-top:8px;color:#94a3b8;font-size:13px" id="onlineStatus">Not connected to online server</div>
  </div>
  <script src="pong.js"></script>
  <div id="translateUI">
    <button id="translateButton" class="translate-btn" aria-label="Translate">🌐</button>
    <div id="translateMenu" class="translate-menu" role="dialog" aria-hidden="true">
      <select id="translateSelect">
        <option value="nl">Nederlands</option>
        <option value="en">English</option>
        <option value="es">Espanol</option>
        <option value="fr">Francais</option>
        <option value="de">Deutsch</option>
      </select>
      <button id="translateApplyButton" type="button">Apply</button>
    </div>
  </div>
  <script>
  (function(){
    const btn=document.getElementById('translateButton');
    const menu=document.getElementById('translateMenu');
    const sel=document.getElementById('translateSelect');
    const apply=document.getElementById('translateApplyButton');
    if(!btn||!menu) return;
    btn.addEventListener('click',()=>menu.classList.toggle('open'));
    apply.addEventListener('click',()=>{
      const lang=sel.value;
      localStorage.setItem('cyberbullLanguage',lang);
      menu.classList.remove('open');
      if(typeof updateTexts==='function') try{updateTexts(lang)}catch(e){}
    });
    const lang=localStorage.getItem('cyberbullLanguage')||'nl';
    if(sel) sel.value=lang;
  })();
  </script>
</body>
</html>
