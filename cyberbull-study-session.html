<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Session - CyberBull</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .session-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .timer-display {
      font-size: 72px;
      font-weight: bold;
      text-align: center;
      color: #667eea;
      font-family: 'Courier New', monospace;
      margin: 30px 0;
      letter-spacing: 5px;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }
    
    .stat-box {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-box label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .stat-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }
    
    .focus-meter {
      width: 100%;
      height: 30px;
      background: #ddd;
      border-radius: 15px;
      overflow: hidden;
      margin: 20px 0;
    }
    
    .focus-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 100%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    
    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-start {
      background: #667eea;
      color: white;
    }
    
    .btn-start:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    
    .btn-pause {
      background: #ff9800;
      color: white;
    }
    
    .btn-pause:hover {
      background: #e68900;
    }
    
    .btn-end {
      background: #e74c3c;
      color: white;
    }
    
    .btn-end:hover {
      background: #c0392b;
    }
    
    .btn-back {
      background: #bdc3c7;
      color: white;
    }
    
    .btn-back:hover {
      background: #95a5a6;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .rewards-preview {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      border-left: 4px solid #667eea;
    }
    
    .rewards-preview h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 14px;
      text-transform: uppercase;
    }
    
    .reward-item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }
    
    .reward-label {
      color: #666;
    }
    
    .reward-value {
      font-weight: bold;
      color: #667eea;
    }
    
    .status {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: bold;
      display: none;
    }
    
    .status.idle {
      background: #ecf0f1;
      color: #34495e;
      display: block;
    }
    
    .status.active {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status.paused {
      background: #fff3cd;
      color: #856404;
      display: block;
    }
    
    .session-complete {
      display: none;
      text-align: center;
    }
    
    .session-complete.show {
      display: block;
    }
    
    .session-complete h2 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 20px;
    }
    
    .reward-earned {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin: 20px 0;
    }
    
    .reward-earned .amount {
      font-size: 48px;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .reward-earned .label {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .focus-warning {
      background: #ffebee;
      border: 2px solid #f44336;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
      font-size: 14px;
    }
    
    .focus-warning.show {
      display: block;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>
  <script>
    window.globalAuth.requireAuth();
  </script>

<div class="session-container">
  <h1>📖 Study Session</h1>
  
  <div class="status idle" id="statusMessage">Ready to start studying</div>
  
  <div class="focus-warning" id="focusWarning">
    ⚠️ Window lost focus! Your focus score is decreasing.
  </div>
  
  <div class="timer-display" id="timerDisplay">00:00:00</div>
  
  <div class="focus-meter">
    <div class="focus-bar" id="focusBar" style="width: 100%;">
      Focus: 100%
    </div>
  </div>
  
  <div class="stats-row">
    <div class="stat-box">
      <label>Duration</label>
      <div class="value" id="durationDisplay">0m</div>
    </div>
    <div class="stat-box">
      <label>Focus Score</label>
      <div class="value" id="focusDisplay">100%</div>
    </div>
  </div>
  
  <div class="rewards-preview" id="rewardsPreview">
    <h3>📊 Estimated Rewards</h3>
    <div class="reward-item">
      <span class="reward-label">XP:</span>
      <span class="reward-value" id="estimatedXp">0</span>
    </div>
    <div class="reward-item">
      <span class="reward-label">Coins:</span>
      <span class="reward-value" id="estimatedCoins">0</span>
    </div>
  </div>
  
  <div class="controls">
    <button class="btn-start" id="startBtn" onclick="startSession()">Start Study</button>
    <button class="btn-pause" id="pauseBtn" onclick="pauseSession()" disabled>Pause</button>
    <button class="btn-end" id="endBtn" onclick="endSession()" disabled>End Session</button>
  </div>
  
  <button class="btn-back" style="width: 100%; margin-top: 15px;" onclick="goBack()">← Back to Home</button>
  
  <div class="session-complete" id="sessionComplete">
    <h2>✨ Session Complete!</h2>
    <div class="reward-earned">
      <div class="label">XP Earned</div>
      <div class="amount" id="finalXp">0</div>
    </div>
    <div class="reward-earned" style="background: linear-gradient(135deg, #f59e0b, #ea580c);">
      <div class="label">Coins Earned</div>
      <div class="amount" id="finalCoins">0</div>
    </div>
    <button class="btn-start" style="width: 100%; margin-top: 20px;" onclick="startNewSession()">Start Another Session</button>
    <button class="btn-back" style="width: 100%; margin-top: 10px;" onclick="goBack()">Return to Home</button>
  </div>
</div>

<script src="admin.js"></script>
<script src="progression.js"></script>

<script>
  const currentUser = localStorage.getItem('currentUser');
  const currentUserKey = localStorage.getItem('currentUserKey');
  
  if (!currentUser || !currentUserKey) {
    window.location.href = 'cyberbull-landing.html';
  }
  
  let sessionData = null;
  let sessionActive = false;
  let sessionPaused = false;
  let timerInterval = null;
  let focusCheckInterval = null;
  let pageHasFocus = true;
  
  function updateTimerDisplay() {
    if (!sessionData) return;
    
    const seconds = Math.floor((Date.now() - new Date(sessionData.startTime).getTime()) / 1000);
    const hours = Math.floor(seconds / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    
    const displayHours = String(hours).padStart(2, '0');
    const displayMinutes = String(minutes).padStart(2, '0');
    const displaySecs = String(secs).padStart(2, '0');
    
    document.getElementById('timerDisplay').textContent = `${displayHours}:${displayMinutes}:${displaySecs}`;
    document.getElementById('durationDisplay').textContent = minutes > 0 ? `${minutes}m` : `${secs}s`;
    
    updateRewardsEstimate();
  }
  
  function updateRewardsEstimate() {
    if (!sessionData) return;
    
    const seconds = Math.floor((Date.now() - new Date(sessionData.startTime).getTime()) / 1000);
    const minutes = Math.floor(seconds / 60);
    
    let baseXp = Math.floor(minutes / 10);
    let baseCoins = Math.floor(minutes / 5);
    
    if (minutes >= 60) {
      baseXp *= 1.5;
      baseCoins *= 1.5;
    } else if (minutes >= 30) {
      baseXp *= 1.25;
      baseCoins *= 1.25;
    }
    
    const focusMultiplier = sessionData.focusScore / 100;
    baseXp = Math.floor(baseXp * focusMultiplier);
    baseCoins = Math.floor(baseCoins * focusMultiplier);
    
    document.getElementById('estimatedXp').textContent = baseXp;
    document.getElementById('estimatedCoins').textContent = baseCoins;
  }
  
  function updateFocusScore() {
    if (!sessionActive || sessionPaused) return;
    
    if (!pageHasFocus) {
      sessionData.focusScore = Math.max(0, sessionData.focusScore - 5);
    }
    
    const focusPercent = Math.round(sessionData.focusScore);
    document.getElementById('focusDisplay').textContent = `${focusPercent}%`;
    
    const focusBar = document.getElementById('focusBar');
    focusBar.style.width = focusPercent + '%';
    focusBar.textContent = `Focus: ${focusPercent}%`;
    
    if (focusPercent < 50) {
      focusBar.style.background = 'linear-gradient(90deg, #f44336, #ff9800)';
    } else if (focusPercent < 75) {
      focusBar.style.background = 'linear-gradient(90deg, #ff9800, #ffc107)';
    } else {
      focusBar.style.background = 'linear-gradient(90deg, #667eea, #764ba2)';
    }
  }
  
  window.addEventListener('focus', () => {
    pageHasFocus = true;
    document.getElementById('focusWarning').classList.remove('show');
  });
  
  window.addEventListener('blur', () => {
    pageHasFocus = false;
    document.getElementById('focusWarning').classList.add('show');
  });
  
  function startSession() {
    if (sessionActive) return;
    
    sessionData = window.progressionAPI.startStudySession(currentUserKey);
    sessionActive = true;
    sessionPaused = false;
    
    document.getElementById('startBtn').disabled = true;
    document.getElementById('pauseBtn').disabled = false;
    document.getElementById('endBtn').disabled = false;
    
    const statusDiv = document.getElementById('statusMessage');
    statusDiv.className = 'status active';
    statusDiv.textContent = '▶️ Session Active';
    
    timerInterval = setInterval(updateTimerDisplay, 100);
    focusCheckInterval = setInterval(updateFocusScore, 2000);
    
    window.progressionAPI.updateQuestProgress(currentUserKey, 'multiplayer_session', 0);
  }
  
  function pauseSession() {
    if (!sessionActive) return;
    
    if (sessionPaused) {
      sessionPaused = false;
      document.getElementById('pauseBtn').textContent = 'Pause';
      timerInterval = setInterval(updateTimerDisplay, 100);
      focusCheckInterval = setInterval(updateFocusScore, 2000);
      
      const statusDiv = document.getElementById('statusMessage');
      statusDiv.className = 'status active';
      statusDiv.textContent = '▶️ Session Active';
    } else {
      sessionPaused = true;
      document.getElementById('pauseBtn').textContent = 'Resume';
      clearInterval(timerInterval);
      clearInterval(focusCheckInterval);
      
      const statusDiv = document.getElementById('statusMessage');
      statusDiv.className = 'status paused';
      statusDiv.textContent = '⏸️ Session Paused';
    }
  }
  
  function endSession() {
    if (!sessionActive || !sessionData) return;
    
    clearInterval(timerInterval);
    clearInterval(focusCheckInterval);
    
    const finalSession = window.progressionAPI.endStudySession(sessionData, currentUserKey);
    
    // Update daily quest progress
    window.progressionAPI.updateQuestProgress(currentUserKey, 'study_30m', Math.floor(finalSession.duration / 60));
    window.progressionAPI.updateQuestProgress(currentUserKey, 'study_60m', Math.floor(finalSession.duration / 60));
    window.progressionAPI.updateQuestProgress(currentUserKey, 'study_120m', Math.floor(finalSession.duration / 60));
    window.progressionAPI.updateQuestProgress(currentUserKey, 'focus_90', finalSession.focusScore >= 90 ? 1 : 0);
    
    // Check for badges
    const newBadges = window.progressionAPI.checkAndAwardBadges(currentUserKey);
    
    sessionActive = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = true;
    document.getElementById('endBtn').disabled = true;
    document.getElementById('pauseBtn').textContent = 'Pause';
    
    document.getElementById('rewardsPreview').style.display = 'none';
    document.getElementById('finalXp').textContent = finalSession.xpEarned;
    document.getElementById('finalCoins').textContent = finalSession.coinsEarned;
    
    document.getElementById('sessionComplete').classList.add('show');
  }
  
  function startNewSession() {
    sessionData = null;
    document.getElementById('sessionComplete').classList.remove('show');
    document.getElementById('rewardsPreview').style.display = 'block';
    document.getElementById('timerDisplay').textContent = '00:00:00';
    document.getElementById('durationDisplay').textContent = '0m';
    document.getElementById('focusDisplay').textContent = '100%';
    document.getElementById('estimatedXp').textContent = '0';
    document.getElementById('estimatedCoins').textContent = '0';
    document.getElementById('statusMessage').className = 'status idle';
    document.getElementById('statusMessage').textContent = 'Ready to start studying';
    startSession();
  }
  
  function goBack() {
    if (sessionActive && !confirm('End study session? You will lose unsaved progress.')) {
      return;
    }
    window.location.href = 'cyberbull-student.html';
  }
  
  // Initialize
  updateRewardsEstimate();
</script>

</body>
</html>
